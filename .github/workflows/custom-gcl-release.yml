name: custom-gcl release

on:
  push:
    tags:
      - "custom-gcl/v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOCACHE: ${{ github.workspace }}/.gocache
  GOMODCACHE: ${{ github.workspace }}/.gomodcache
  GOPATH: ${{ github.workspace }}/.gopath

jobs:
  prepare:
    name: prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      artifact_prefix: ${{ steps.release_meta.outputs.artifact_prefix }}
      checksum_file: ${{ steps.release_meta.outputs.checksum_file }}
      release_version: ${{ steps.release_meta.outputs.release_version }}
      toolchain_version: ${{ steps.toolchain.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned golangci-lint version
        id: toolchain
        run: |
          version="$(awk '/^version:/ {print $2; exit}' .custom-gcl.yml)"
          if [ -z "${version}" ]; then
            echo "missing version in .custom-gcl.yml" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Derive release metadata
        id: release_meta
        run: |
          release_version="${GITHUB_REF_NAME#custom-gcl/}"
          artifact_prefix="custom-gcl_${release_version}"
          checksum_file="${artifact_prefix}_checksums.txt"

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "artifact_prefix=${artifact_prefix}" >> "${GITHUB_OUTPUT}"
          echo "checksum_file=${checksum_file}" >> "${GITHUB_OUTPUT}"

  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        id: setup_go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Restore Go caches
        uses: actions/cache@v5
        with:
          path: |
            .gomodcache
            .gocache
          key: ${{ runner.os }}-go-${{ steps.setup_go.outputs.go-version }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.mod', 'go.sum', '.custom-gcl.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup_go.outputs.go-version }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-
            ${{ runner.os }}-go-${{ steps.setup_go.outputs.go-version }}-

      - name: Build release binary
        env:
          ARTIFACT_NAME: ${{ needs.prepare.outputs.artifact_prefix }}_${{ matrix.goos }}_${{ matrix.goarch }}
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
          TOOLCHAIN_VERSION: ${{ needs.prepare.outputs.toolchain_version }}
        run: |
          go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@"${TOOLCHAIN_VERSION}" custom
          mv custom-gcl "${ARTIFACT_NAME}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_prefix }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ${{ needs.prepare.outputs.artifact_prefix }}_${{ matrix.goos }}_${{ matrix.goarch }}

  publish:
    name: publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist
          pattern: ${{ needs.prepare.outputs.artifact_prefix }}_*

      - name: Create checksum manifest
        working-directory: dist
        env:
          CHECKSUM_FILE: ${{ needs.prepare.outputs.checksum_file }}
        run: |
          sha256sum custom-gcl_* > "${CHECKSUM_FILE}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Built from `github.com/caelaxie/camellia` with the pinned `golangci-lint` toolchain `${{ needs.prepare.outputs.toolchain_version }}` from `.custom-gcl.yml`.

            This release publishes only the `custom-gcl` binaries for `linux-amd64`, `darwin-amd64`, and `darwin-arm64`, plus the SHA-256 checksum manifest.
          files: |
            dist/${{ needs.prepare.outputs.artifact_prefix }}_*
          name: custom-gcl ${{ needs.prepare.outputs.release_version }}
