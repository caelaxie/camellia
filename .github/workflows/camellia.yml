name: camellia

on:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOCACHE: ${{ github.workspace }}/.gocache
  GOLANGCI_LINT_CACHE: ${{ github.workspace }}/.golangci-cache
  GOMODCACHE: ${{ github.workspace }}/.gomodcache
  GOPATH: ${{ github.workspace }}/.gopath
  SARIF_FILE: lint.sarif

jobs:
  tests:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Restore Go caches
        uses: actions/cache@v5
        with:
          path: |
            .gomodcache
            .gocache
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-test-
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-

      - name: Run Go tests
        run: go test ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Restore Go and golangci caches
        uses: actions/cache@v5
        with:
          path: |
            .gomodcache
            .gocache
            .golangci-cache
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-camellia-${{ hashFiles('go.mod', 'go.sum', '.golangci.yml', '.custom-gcl.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-camellia-
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-

      - name: Build camellia
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4 custom

      - name: Smoke test camellia binary
        run: |
          ./camellia version
          ./camellia linters -c .golangci.yml | grep -q '^camellia:'

      - name: Verify golangci-lint configuration
        run: ./camellia config verify -c .golangci.yml

      - name: Run supported lint command and emit SARIF
        id: lint
        continue-on-error: true
        run: ./camellia run -c .golangci.yml --output.text.path=stdout --output.sarif.path="${SARIF_FILE}" ./...

      - name: Upload SARIF results
        if: ${{ always() && hashFiles('lint.sarif') != '' && (github.event_name == 'push' || !github.event.pull_request.head.repo.fork) }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          category: camellia
          sarif_file: ${{ env.SARIF_FILE }}

      - name: Fail when lint reports issues
        if: steps.lint.outcome == 'failure'
        run: exit 1
